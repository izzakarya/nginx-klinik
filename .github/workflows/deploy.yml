name: Build and Deploy

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nginx-klinik

jobs:
  # === JOB 1: Build Image Secara Paralel ===
  build-images:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            tag-suffix: amd64
          - os: server-arm64       # <-- Ini self-hosted VM dengan arsitektur ARM64
            platform: linux/arm64
            tag-suffix: arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Single Arch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.tag-suffix }}
          provenance: false
          sbom: false

      - name: Clean up Docker Trash on Self-Hosted VM
        if: matrix.os == 'server-arm64'
        run: |
          echo "Memulai pembersihan cache dan layer sampah di VM..."
          docker system prune -f --volumes

  # === JOB 2: Menggabungkan Menjadi Satu Manifest (Multi-Arch) ===
  create-manifest:
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tag (YYMMDD + short SHA)
        run: |
          DATE=$(date +'%y%m%d')
          SHORT_SHA=${GITHUB_SHA::4}
          echo "TAG=${DATE}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Create and Push Manifest List
        run: |
          # Menggabungkan image amd64 dan arm64 yang sudah di-push oleh masing-masing server
          docker manifest create ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:amd64 ${{ env.IMAGE_NAME }}:arm64
          docker manifest create ${{ env.IMAGE_NAME }}:${{ env.TAG }} ${{ env.IMAGE_NAME }}:amd64 ${{ env.IMAGE_NAME }}:arm64
          
          # Push manifest final ke GitHub Packages (GHCR)
          docker manifest push ${{ env.IMAGE_NAME }}:latest
          docker manifest push ${{ env.IMAGE_NAME }}:${{ env.TAG }}